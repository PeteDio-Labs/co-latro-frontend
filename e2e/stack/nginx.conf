# Co-latro E2E stack — nginx serving the static build (dist/) and proxying /api to the
# backend container (PET-98). Mirrors deploy/nginx.conf (the poker-api VM config) but is
# self-contained for the docker-compose e2e stack: same-origin serving so the browser only
# ever talks to one origin (http://localhost:8080), exactly what the Playwright smoke expects.
#
# Differences from deploy/nginx.conf: proxies /api to the `backend` compose service (not
# 127.0.0.1), listens on 80 inside the container (mapped to 8080 on the host by compose),
# and drops the long-lived asset cache headers (irrelevant for a throwaway test run).

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # Static build output, bind-mounted from the host's dist/ by compose.
    root   /usr/share/nginx/html;
    index  index.html;

    # API → backend compose service on :3020. Trailing slashes preserved so /api/run/play
    # maps 1:1, matching the production nginx and the dev Vite proxy.
    location /api/ {
        proxy_pass         http://backend:3020;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: client-side app, so unknown routes return index.html (never the API).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
