# Co-latro frontend — Workflow A (App CI/CD), publish-on-merge.
#   PR            → typecheck + build (dist/)
#   push to main  → build + upload dist/ to the MinIO bucket `co-latro-frontend`
#
# The build's API calls are all relative (/api/...); nginx on the poker-api VM serves dist/
# and reverse-proxies /api to the backend on :3020 (same origin, no CORS). See deploy/nginx.conf.
#
# MinIO write creds come from Vault via GitHub OIDC (colatro-ci role → colatro-ci policy,
# secret kv/services/minio-frontend-ci), NOT repo Actions secrets. Runs on the in-homelab
# self-hosted runner (VM 232) so it can reach MinIO (.221) + Vault (.223). The on-VM
# refresh (pull bucket → web root) is the manual deploy.yml.
name: ci

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token

jobs:
  build:
    runs-on: [self-hosted, linux, x64, homelab]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # `bun run build` is `tsc --noEmit && vite build`, so this covers typecheck too.
      - name: Typecheck
        run: bun run typecheck

      # PET-66 — vitest gate (unit).
      - name: Test (vitest)
        run: bun run test

      - name: Build
        run: bun run build

      # vault-action's caCertificate wants base64 PEM; a `with:` can't read a file.
      - name: Encode Vault CA
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        id: vault_ca
        run: echo "b64=$(base64 -w0 .github/vault-ca.crt)" >> "$GITHUB_OUTPUT"

      - name: Vault — mint MinIO write creds via OIDC
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        uses: hashicorp/vault-action@v3
        with:
          url: https://192.168.50.223:8200
          method: jwt
          path: jwt-github # non-default mount — must be explicit or Vault 403s
          role: colatro-ci
          jwtGithubAudience: https://github.com/PeteDio-Labs
          caCertificate: ${{ steps.vault_ca.outputs.b64 }}
          exportEnv: true
          secrets: |
            kv/data/services/minio-frontend-ci endpoint | MINIO_ENDPOINT ;
            kv/data/services/minio-frontend-ci access_key | MINIO_ACCESS_KEY ;
            kv/data/services/minio-frontend-ci secret_key | MINIO_SECRET_KEY

      # main: publish dist/ to MinIO (S3-compatible).
      - name: Upload to MinIO
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        env:
          MINIO_BUCKET: co-latro-frontend
        run: ./scripts/deploy.sh

  # PET-98 — Playwright E2E smoke gate. Stands the backend + nginx stack up in-job (docker
  # compose: ephemeral Postgres + the Nexus-published backend image + nginx serving a fresh
  # dist/) at http://localhost:8080, then runs the smoke against it. Gates PRs like vitest:
  # a separate job, so it shows as its own required check and a flaky e2e can't be confused
  # with a typecheck/unit failure. Runs on the in-homelab runner so it can pull from Nexus.
  e2e:
    runs-on: [self-hosted, linux, x64, homelab]
    env:
      COMPOSE: docker compose -f e2e/stack/docker-compose.yml
      E2E_BASE_URL: http://localhost:8080
      # Run Playwright inside its official image (browsers + system deps preinstalled) so we
      # never shell out to `playwright install --with-deps` (that runs `sudo apt-get`, and the
      # homelab runner has no passwordless sudo). MUST match the installed @playwright/test
      # version (package.json) — bump both together.
      PW_IMAGE: mcr.microsoft.com/playwright:v1.60.0-jammy
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      # The smoke runs against the real static build that nginx serves (dist/ is bind-mounted
      # into the nginx container by the compose file).
      - name: Build (dist/ for nginx)
        run: bun run build

      # Pull the latest published backend image, then bring the stack up. The compose file
      # defaults backend to docker.pdlab.dev/co-latro-backend:latest (what the backend repo's
      # ci.yml pushes on merge); the homelab runner can reach Nexus.
      - name: Stack up (postgres + backend + nginx)
        run: |
          $COMPOSE pull --quiet
          $COMPOSE up -d

      # Compose's healthchecks already gate startup ordering (nginx waits for a healthy
      # backend, which waits for a healthy postgres). Re-confirm the same-origin endpoint the
      # browser will hit is actually serving before launching Playwright.
      - name: Wait for stack health (http://localhost:8080)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null "$E2E_BASE_URL/"; then
              echo "nginx serving the app shell — stack is up."
              exit 0
            fi
            echo "waiting for $E2E_BASE_URL ... ($i/60)"
            sleep 2
          done
          echo "::error::stack did not become healthy at $E2E_BASE_URL within timeout"
          $COMPOSE ps
          $COMPOSE logs --no-color
          exit 1

      # Run the smoke inside the official Playwright container — it ships chromium + every
      # system library, so there's NO `playwright install --with-deps` (which needs sudo the
      # runner doesn't have). Joined to the host network so http://localhost:8080 (the same
      # endpoint the wait step polled) resolves to the compose-published nginx. `--ipc=host`
      # gives chromium a real /dev/shm — the default 64MB segfaults it (SIGSEGV). `npx` runs
      # the TS config/specs via Playwright's own loader, so no bun is needed inside the image;
      # node_modules (incl. @playwright/test) come from the bun install above via the mount.
      - name: E2E smoke (Playwright container)
        run: |
          docker run --rm \
            --network host \
            --ipc=host \
            -e E2E_BASE_URL="$E2E_BASE_URL" \
            -e CI=1 \
            -v "$PWD":/work \
            -w /work \
            "$PW_IMAGE" \
            npx playwright test --config e2e/playwright.config.ts

      # Diagnostics on failure: container logs make a red e2e debuggable without a re-run.
      - name: Stack logs (on failure)
        if: failure()
        run: $COMPOSE logs --no-color

      # Always tear the stack down (and its volumes) so the runner is left clean.
      - name: Stack down
        if: always()
        run: $COMPOSE down -v --remove-orphans
