<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#2a0a3e" />
      <stop offset="60%" stop-color="#120421" />
      <stop offset="100%" stop-color="#050208" />
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)" />
  <rect x="58" y="58" width="396" height="396" rx="80" fill="none" stroke="#b026ff" stroke-width="3" opacity="0.45" />
  <!-- neon spade: pink glow behind, cyan front -->
  <text x="256" y="312" font-family="Georgia, 'Times New Roman', serif" font-size="248" text-anchor="middle" fill="#ff2e97" opacity="0.55" filter="url(#glow)">&#9824;</text>
  <text x="256" y="312" font-family="Georgia, 'Times New Roman', serif" font-size="248" text-anchor="middle" fill="#00e5ff" filter="url(#glow)">&#9824;</text>
  <text x="256" y="430" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="62" letter-spacing="8" text-anchor="middle" fill="#ffffff">MB</text>
</svg>
