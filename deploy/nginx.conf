# Co-latro frontend — nginx server for the poker-api VM (230).
# Serves the static build (dist/) and reverse-proxies /api to the co-latro backend on the
# same host (:3020), so the browser only ever talks to one origin (no CORS). The build's
# fetch calls are all relative (/api/...), which is what makes same-origin serving work.
#
# Deploy: render dist/ to root below (synced from the MinIO `co-latro-frontend` bucket by
# infra) and drop this file at /etc/nginx/conf.d/co-latro.conf.
#
# This is the ONE site on the dedicated poker-api VM, so it claims `default_server`.
# nginx allows only one default_server per address — so remove the distro's stock
# default first, then test before reload:
#   rm -f /etc/nginx/sites-enabled/default        # Debian/Ubuntu stock site
#   rm -f /etc/nginx/conf.d/default.conf          # RHEL/nginx.org stock site
#   nginx -t && systemctl reload nginx            # `nginx -t` must pass before reload

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    # Static build output. Infra syncs the MinIO bucket contents here.
    root   /var/www/co-latro;
    index  index.html;

    # API → backend on the same VM. Trailing slashes preserved so /api/run/play maps 1:1.
    location /api/ {
        proxy_pass         http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hashed, immutable build assets — cache hard.
    location /assets/ {
        expires    1y;
        add_header  Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # PWA service-worker-ish files must never be stale-cached.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files  $uri =404;
    }

    # SPA fallback: client-side app, so unknown routes return index.html (never the API).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
